name: UAT

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  uat:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Lint, unit tests e E2E UAT
        run: npm run verify
        env:
          CI: true
